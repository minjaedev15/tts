<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge TTS Web UI</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        #result { margin-top: 2rem; display: none; text-align: center; }
        audio { width: 100%; margin-top: 1rem; }
        .loader {
            display: none;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edge TTS Server</h1>
        
        <div class="form-group">
            <label for="text">Text to Speak</label>
            <textarea id="text" rows="4" placeholder="Enter text here..."></textarea>
        </div>

        <div class="form-group">
            <label for="voice">Voice</label>
            <select id="voice">
                <option value="">Loading voices...</option>
            </select>
        </div>

        <button id="generateBtn">Generate Speech</button>
        
        <div class="loader" id="loader">Generating audio, please wait...</div>

        <div id="result">
            <label>Generated Audio:</label>
            <audio id="audioPlayer" controls></audio>
            <div style="margin-top: 1rem;">
                <a id="downloadLink" href="#" download="speech.mp3" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Download MP3</a>
            </div>
        </div>
    </div>

    <script>
        const voiceSelect = document.getElementById('voice');
        const generateBtn = document.getElementById('generateBtn');
        const textInput = document.getElementById('text');
        const resultDiv = document.getElementById('result');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadLink = document.getElementById('downloadLink');
        const loader = document.getElementById('loader');

        // Fetch voices on load
        async function fetchVoices() {
            try {
                const response = await fetch('/api/voices');
                const voices = await response.json();
                voiceSelect.innerHTML = '';
                
                // Group by language (locale)
                const locales = [...new Set(voices.map(v => v.locale))].sort();
                
                locales.forEach(locale => {
                    const group = document.createElement('optgroup');
                    group.label = locale;
                    
                    voices.filter(v => v.locale === locale).forEach(v => {
                        const option = document.createElement('option');
                        option.value = v.shortName;
                        option.textContent = v.friendlyName.replace('Microsoft ', '').replace(' Online (Natural)', '');
                        if (v.shortName === 'ko-KR-SunHiNeural') option.selected = true;
                        group.appendChild(option);
                    });
                    voiceSelect.appendChild(group);
                });
            } catch (error) {
                console.error('Error fetching voices:', error);
                voiceSelect.innerHTML = '<option value="">Error loading voices</option>';
            }
        }

        generateBtn.onclick = async () => {
            const text = textInput.value.trim();
            const voice = voiceSelect.value;

            if (!text) return alert('Please enter some text');
            if (!voice) return alert('Please select a voice');

            generateBtn.disabled = true;
            loader.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, voice })
                });

                const data = await response.json();
                if (data.url) {
                    audioPlayer.src = data.url;
                    downloadLink.href = data.url;
                    resultDiv.style.display = 'block';
                    audioPlayer.play();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Request failed: ' + error.message);
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
            }
        };

        fetchVoices();
    </script>
</body>
</html>
