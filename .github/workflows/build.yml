name: Build Executables (Nuitka)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-ubuntu:
    name: ubuntu-latest (docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI docker image
        run: docker compose -f docker-compose.yml build

      - name: Build Linux executable inside docker (outputs -> build/)
        run: |
          docker compose -f docker-compose.yml run --rm tts-ci bash -lc "bash ./build.sh"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-ubuntu-latest-zip
          path: build/build_output.zip
          if-no-files-found: error

  build-windows:
    name: windows-latest (host)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka (standalone)
        env:
          TTS_DISABLE_TTS: "1"
          TTS_DISABLE_AUDIO: "1"
        run: |
          rm -rf dist build || true
          rm -rf build\build_output.zip || true
          python -m nuitka --standalone --output-dir=dist app.py

      - name: Package output (ZIP -> build/)
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          New-Item -ItemType Directory -Path build | Out-Null
          if (Test-Path build\build_output.zip) { Remove-Item build\build_output.zip -Force }
          Compress-Archive -Path dist\* -DestinationPath build\build_output.zip -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-windows-latest-zip
          path: build/build_output.zip
          if-no-files-found: error

  build-macos:
    name: macos-latest (host)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka (standalone) - macOS (--mode=app)
        env:
          TTS_DISABLE_TTS: "1"
          TTS_DISABLE_AUDIO: "1"
        run: |
          rm -rf dist build || true
          rm -f build/build_output.zip build/build_output.dmg || true
          mkdir -p build
          python -m nuitka --standalone --mode=app --output-dir=dist app.py

      - name: Package output (ZIP -> build/)
        shell: bash
        run: |
          rm -f build/build_output.zip
          cd dist
          zip -r ../build/build_output.zip .
          cd ..

      - name: Create DMG (-> build/)
        shell: bash
        run: |
          rm -f build/build_output.dmg || true
          mkdir -p dmg_contents
          cp build/build_output.zip dmg_contents/
          hdiutil create -volname "TTS-Build" -srcfolder dmg_contents -ov -format UDZO build/build_output.dmg

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-macos-latest-zip
          path: build/build_output.zip
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-macos-latest-dmg
          path: build/build_output.dmg
          if-no-files-found: error
