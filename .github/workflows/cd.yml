name: CD (Artifact)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI docker image
        run: |
          docker compose -f docker-compose.yml build

      - name: Create artifact zip (source snapshot) - inside docker
        run: |
          docker compose -f docker-compose.yml run --rm tts-ci sh -lc "rm -f tts-source.zip && zip -r tts-source.zip . -x 'venv/*' '__pycache__/*' 'app.app/*'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-source
          path: tts-source.zip
          if-no-files-found: error
